<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>European Reformation Pilgrimage</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { height: 100%; }

  body {
    font-family: 'Inter', sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  header {
    background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
    padding: 16px 32px;
    border-bottom: 2px solid #e94560;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    color: #fff;
    letter-spacing: 0.5px;
  }

  header .subtitle {
    font-size: 0.85rem;
    color: #a0a0c0;
    font-weight: 300;
  }

  .legend {
    margin-left: auto;
    display: flex;
    gap: 16px;
    font-size: 0.75rem;
    color: #a0a0c0;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
  }

  .main-container {
    display: flex;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }

  #sidebar {
    width: 380px;
    background: #16213e;
    overflow-y: auto;
    flex-shrink: 0;
    border-right: 1px solid #2a2a4a;
  }

  #sidebar::-webkit-scrollbar { width: 6px; }
  #sidebar::-webkit-scrollbar-track { background: #16213e; }
  #sidebar::-webkit-scrollbar-thumb { background: #3a3a5a; border-radius: 3px; }

  .day-card {
    padding: 16px 20px 16px 24px;
    border-bottom: 1px solid #2a2a4a;
    cursor: pointer;
    transition: all 0.2s;
  }

  .day-card:hover { background: #1a2744; }
  .day-card.active { background: #1a2744; border-left: 3px solid #e94560; }

  .day-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .day-badge {
    background: #e94560;
    color: #fff;
    font-size: 0.7rem;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
  }

  .day-badge.protestant { background: #e94560; }
  .day-badge.swiss { background: #6fcf97; color: #1a1a2e; }
  .day-badge.catholic { background: #f0c060; color: #1a1a2e; }
  .day-badge.transit { background: #0f3460; border: 1px solid #7a7aaa; }

  .day-card .type-bar {
    width: 4px;
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    border-radius: 2px 0 0 2px;
  }

  .day-card {
    position: relative;
  }

  .day-city {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: #fff;
  }

  .day-date {
    font-size: 0.75rem;
    color: #7a7a9a;
    margin-left: auto;
  }

  .day-summary {
    font-size: 0.8rem;
    color: #a0a0c0;
    line-height: 1.5;
  }

  .day-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 8px;
  }

  .tag {
    font-size: 0.65rem;
    padding: 2px 7px;
    border-radius: 3px;
    background: #2a2a4a;
    color: #c0c0e0;
  }

  .tag.reformer { background: #1a3a2a; color: #6fcf97; }
  .tag.site { background: #2a2a3a; color: #a0a0f0; }
  .tag.currency { background: #3a2a1a; color: #f0c060; }
  .tag.flight { background: #1a2a3a; color: #7ab8f5; }

  /* Flight card styles */
  .day-badge.flight { background: #2a4a6a; border: 1px solid #7ab8f5; }

  .flight-segment {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    font-size: 0.8rem;
  }

  .flight-segment + .flight-segment {
    border-top: 1px dashed #2a2a4a;
  }

  .flight-route {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
  }

  .flight-code {
    font-weight: 600;
    color: #fff;
    font-size: 0.85rem;
  }

  .flight-arrow {
    color: #7ab8f5;
    font-size: 0.7rem;
  }

  .flight-time {
    color: #a0a0c0;
    font-size: 0.75rem;
  }

  .flight-airline {
    font-size: 0.7rem;
    color: #7a7a9a;
  }

  .flight-detail-segment {
    background: #1a2744;
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 10px;
  }

  .flight-detail-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .flight-detail-airline {
    font-weight: 600;
    color: #7ab8f5;
    font-size: 0.85rem;
  }

  .flight-detail-number {
    color: #a0a0c0;
    font-size: 0.8rem;
  }

  .flight-detail-route {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .flight-detail-airport {
    flex: 1;
  }

  .flight-detail-airport .airport-code {
    font-size: 1.1rem;
    font-weight: 700;
    color: #fff;
  }

  .flight-detail-airport .airport-name {
    font-size: 0.7rem;
    color: #7a7a9a;
    margin-top: 2px;
  }

  .flight-detail-airport .airport-time {
    font-size: 0.85rem;
    color: #c0c0e0;
    margin-top: 4px;
  }

  .flight-detail-arrow {
    color: #7ab8f5;
    font-size: 1.2rem;
    flex-shrink: 0;
  }

  .flight-detail-meta {
    display: flex;
    gap: 16px;
    font-size: 0.75rem;
    color: #7a7a9a;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed #2a2a4a;
  }

  .flight-detail-meta span { display: inline-flex; align-items: center; gap: 4px; }

  .baggage-info {
    background: #1a2744;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 0.8rem;
    color: #c0c0e0;
    line-height: 1.6;
  }

  .baggage-info strong { color: #f0c060; }

  .food-item, .shop-item {
    padding: 6px 0;
    padding-left: 16px;
    position: relative;
    font-size: 0.85rem;
    color: #c0c0e0;
    line-height: 1.6;
  }

  .food-item::before {
    content: '🍽';
    position: absolute;
    left: -2px;
    font-size: 0.7rem;
  }

  .shop-item::before {
    content: '🛍';
    position: absolute;
    left: -2px;
    font-size: 0.7rem;
  }

  .food-item .item-name, .shop-item .item-name {
    font-weight: 600;
    color: #fff;
  }

  .detail-section h3.food-header { color: #6fcf97; }
  .detail-section h3.shop-header { color: #f0c060; }

  #map {
    flex: 1;
    z-index: 1;
  }

  /* Detail panel overlay */
  #detail-panel {
    display: none;
    position: absolute;
    right: 16px;
    top: 80px;
    width: 400px;
    max-height: calc(100vh - 120px);
    background: #16213eee;
    backdrop-filter: blur(12px);
    border: 1px solid #3a3a5a;
    border-radius: 12px;
    z-index: 1000;
    overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  #detail-panel::-webkit-scrollbar { width: 6px; }
  #detail-panel::-webkit-scrollbar-track { background: transparent; }
  #detail-panel::-webkit-scrollbar-thumb { background: #3a3a5a; border-radius: 3px; }

  .detail-header {
    padding: 20px 24px;
    border-bottom: 1px solid #2a2a4a;
    position: sticky;
    top: 0;
    background: #16213ef0;
    backdrop-filter: blur(12px);
  }

  .detail-close {
    float: right;
    background: none;
    border: none;
    color: #a0a0c0;
    font-size: 1.4rem;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
  }

  .detail-close:hover { color: #fff; }

  .detail-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: #fff;
    margin-bottom: 4px;
  }

  .detail-header .detail-date {
    font-size: 0.8rem;
    color: #e94560;
  }

  .detail-body { padding: 20px 24px; }

  .detail-image {
    width: 100%;
    border-radius: 8px;
    margin-bottom: 16px;
    object-fit: cover;
    max-height: 220px;
    display: block;
  }

  .detail-image-caption {
    font-size: 0.7rem;
    color: #7a7a9a;
    text-align: center;
    margin-top: -10px;
    margin-bottom: 16px;
    font-style: italic;
  }

  .detail-section {
    margin-bottom: 20px;
  }

  .detail-section h3 {
    font-size: 0.85rem;
    font-weight: 600;
    color: #e94560;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .detail-section p, .detail-section li {
    font-size: 0.85rem;
    color: #c0c0e0;
    line-height: 1.7;
  }

  .detail-section ul {
    list-style: none;
    padding: 0;
  }

  .detail-section li {
    padding: 4px 0;
    padding-left: 16px;
    position: relative;
  }

  .detail-section li::before {
    content: '•';
    position: absolute;
    left: 0;
    color: #e94560;
  }

  .site-name {
    font-weight: 600;
    color: #fff;
  }

  .tip-box {
    background: #1a2744;
    border-left: 3px solid #f0c060;
    padding: 12px 16px;
    border-radius: 0 6px 6px 0;
    margin-top: 8px;
  }

  .tip-box p {
    font-size: 0.8rem;
    color: #c0c0d0;
    line-height: 1.6;
  }

  /* Custom map markers */
  .custom-marker {
    background: none;
    border: none;
  }

  .marker-pin {
    width: 28px;
    height: 28px;
    border-radius: 50% 50% 50% 0;
    background: #e94560;
    position: relative;
    transform: rotate(-45deg);
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }

  .marker-pin .marker-day {
    transform: rotate(45deg);
    font-size: 10px;
    font-weight: 700;
    color: #fff;
  }

  .marker-pin.protestant { background: #e94560; }
  .marker-pin.catholic { background: #f0c060; }
  .marker-pin.swiss { background: #6fcf97; }
  .marker-pin.transit { background: #7a7aaa; }

  /* Leaflet popup overrides */
  .leaflet-popup-content-wrapper {
    background: #16213eee;
    border: 1px solid #3a3a5a;
    border-radius: 8px;
    color: #e0e0e0;
  }

  .leaflet-popup-tip { background: #16213eee; }

  .leaflet-popup-content {
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    line-height: 1.5;
    margin: 12px 16px;
  }

  .leaflet-popup-content h3 {
    font-family: 'Playfair Display', serif;
    margin-bottom: 4px;
    color: #fff;
  }

  .leaflet-popup-content .popup-date { color: #e94560; font-size: 0.75rem; }
  .leaflet-popup-content .popup-desc { color: #c0c0e0; margin-top: 6px; }
  .leaflet-popup-content .popup-link {
    color: #e94560;
    cursor: pointer;
    font-size: 0.8rem;
    margin-top: 8px;
    display: inline-block;
  }

  .leaflet-popup-content .popup-link:hover { text-decoration: underline; }

  .lang-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: 16px;
    background: #2a2a4a;
    border-radius: 20px;
    padding: 4px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .lang-btn {
    padding: 4px 12px;
    border-radius: 16px;
    font-size: 0.75rem;
    font-weight: 500;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    color: #a0a0c0;
    background: transparent;
  }

  .lang-btn.active {
    background: #e94560;
    color: #fff;
  }

  .timezone-banner {
    background: #1a2744;
    border-bottom: 1px solid #2a2a4a;
    padding: 6px 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    font-size: 0.75rem;
    color: #a0a0c0;
    flex-shrink: 0;
  }

  .tz-clock {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .tz-clock .tz-time {
    font-weight: 600;
    color: #fff;
    font-size: 0.85rem;
    font-variant-numeric: tabular-nums;
  }

  .tz-clock .tz-label {
    color: #7a7a9a;
  }

  .tz-divider {
    color: #3a3a5a;
    font-size: 0.9rem;
  }

  .tz-diff {
    color: #f0c060;
    font-weight: 500;
  }

  .weather-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.75rem;
    color: #7ab8f5;
    margin-top: 6px;
  }

  .detail-weather {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: #1a2744;
    border-radius: 8px;
    margin-bottom: 16px;
    font-size: 0.85rem;
    color: #7ab8f5;
  }

  .detail-weather .weather-icon { font-size: 1.4rem; }

  /* Mobile tab bar */
  .mobile-tabs {
    display: none;
    background: #16213e;
    border-bottom: 1px solid #2a2a4a;
    flex-shrink: 0;
  }

  .mobile-tabs button {
    flex: 1;
    padding: 10px;
    background: none;
    border: none;
    color: #7a7a9a;
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }

  .mobile-tabs button.active {
    color: #e94560;
    border-bottom-color: #e94560;
  }

  /* Tablet */
  @media (max-width: 1024px) {
    header { padding: 12px 20px; gap: 12px; }
    header h1 { font-size: 1.3rem; }
    #sidebar { width: 320px; }
    #detail-panel { width: 360px; }
  }

  /* Mobile */
  @media (max-width: 768px) {
    header {
      flex-wrap: wrap;
      padding: 12px 16px;
      gap: 8px;
    }

    header h1 { font-size: 1.15rem; width: auto; }
    header .subtitle { font-size: 0.75rem; order: 3; width: 100%; }

    .legend { display: none; }

    .lang-toggle {
      margin-left: auto;
      order: 2;
    }

    .main-container {
      flex-direction: column;
      position: relative;
    }

    .mobile-tabs { display: flex; }

    #sidebar {
      width: 100%;
      flex: 1;
      overflow-y: auto;
      display: block;
    }

    #sidebar.hidden { display: none; }

    #map {
      flex: 1;
      min-height: 0;
      display: none;
    }

    #map.visible {
      display: block;
      height: 100%;
    }

    #detail-panel {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      max-height: 100vh;
      border-radius: 0;
      z-index: 2000;
    }

    .detail-header { padding: 16px; }
    .detail-body { padding: 16px; }
    .detail-close { font-size: 1.6rem; padding: 4px 8px; }
    .detail-header h2 { font-size: 1.2rem; }

    .day-card { padding: 14px 16px 14px 20px; }
    .day-header { gap: 8px; }
    .day-city { font-size: 1rem; }
  }

  @media (max-width: 768px) {
    .timezone-banner { padding: 5px 16px; gap: 12px; font-size: 0.7rem; }
    .tz-clock .tz-time { font-size: 0.8rem; }
  }

  /* Small phones */
  @media (max-width: 400px) {
    header h1 { font-size: 1rem; }
    header .subtitle { font-size: 0.7rem; }
    .lang-btn { padding: 3px 8px; font-size: 0.7rem; }
    .timezone-banner { gap: 8px; }
  }
</style>
</head>
<body>

<header>
  <h1>European Reformation Pilgrimage</h1>
  <span class="subtitle">March 16 - 27, 2026 &middot; 12 Days &middot; 6 Countries</span>
  <div class="legend">
    <div class="legend-item"><span class="legend-dot" style="background:#e94560"></span> Protestant</div>
    <div class="legend-item"><span class="legend-dot" style="background:#6fcf97"></span> Swiss Reform</div>
    <div class="legend-item"><span class="legend-dot" style="background:#f0c060"></span> Catholic / Counter-Ref</div>
    <div class="legend-item"><span class="legend-dot" style="background:#7a7aaa"></span> Transit</div>
  </div>
  <div class="lang-toggle">
    <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" id="btn-ko" onclick="setLang('ko')">KO</button>
  </div>
</header>

<div class="timezone-banner" id="tz-banner">
  <div class="tz-clock">
    <span class="tz-label" id="tz-home-label">PDT</span>
    <span class="tz-time" id="tz-home-time">--:--</span>
  </div>
  <span class="tz-divider">|</span>
  <div class="tz-clock">
    <span class="tz-label" id="tz-euro-label">CET</span>
    <span class="tz-time" id="tz-euro-time">--:--</span>
  </div>
  <span class="tz-diff" id="tz-diff">+8h</span>
</div>
<div class="mobile-tabs" id="mobile-tabs">
  <button class="active" id="tab-list" onclick="switchTab('list')">Itinerary</button>
  <button id="tab-map" onclick="switchTab('map')">Map</button>
</div>
<div class="main-container">
  <div id="sidebar"></div>
  <div id="map"></div>
  <div id="detail-panel"></div>
</div>

const uiText = {
  en: { history: 'Reformation History', sites: 'Key Sites', tips: 'Practical Tips', weather: 'Expected Weather', details: 'View details' },
  ko: { history: '종교개혁 역사', sites: '주요 유적지', tips: '실용 팁', weather: '예상 날씨', details: '상세 보기' }
};

let currentLang = 'en';
let currentDetailId = null;

function setLang(lang) {
  currentLang = lang;
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-ko').classList.toggle('active', lang === 'ko');
  document.querySelector('header h1').textContent = lang === 'en'
    ? 'European Reformation Pilgrimage'
    : '유럽 종교개혁 순례';
  document.querySelector('header .subtitle').innerHTML = lang === 'en'
    ? 'March 16 - 27, 2026 &middot; 12 Days &middot; 6 Countries'
    : '2026년 3월 16-27일 &middot; 12일 &middot; 6개국';
  rebuildSidebar();
  if (currentDetailId) showDetail(currentDetailId);
}

function getField(stop, field) {
  if (currentLang === 'ko' && ko[stop.id] && ko[stop.id][field] !== undefined) {
    return ko[stop.id][field];
  }
  return stop[field];
}

function rebuildSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  stops.forEach(stop => {
    const card = document.createElement('div');
    card.className = 'day-card';
    card.id = `card-${stop.id}`;
    if (stop.id === currentDetailId) card.classList.add('active');

    if (stop.type === 'flight') {
      // Flight card rendering
      const flightsHtml = stop.flights.map(f => `
        <div class="flight-segment">
          <div class="flight-route">
            <span class="flight-code">${f.from}</span>
            <span class="flight-arrow">&#9992;</span>
            <span class="flight-code">${f.to}</span>
          </div>
          <div>
            <div class="flight-airline">${f.airline} ${f.number}</div>
            <div class="flight-time">${f.duration}</div>
          </div>
        </div>
      `).join('');

      card.innerHTML = `
        <div class="type-bar" style="background:#7ab8f5"></div>
        <div class="day-header">
          <span class="day-badge flight">${stop.days}</span>
          <span class="day-city">${currentLang === 'ko' ? (stop.id === 'flight-out' ? '출발 항공편' : '귀국 항공편') : stop.city}</span>
          <span class="day-date">${stop.dates}</span>
        </div>
        ${flightsHtml}
        <div class="day-tags"><span class="tag flight">${stop.country}</span></div>
      `;
    } else {
      // Normal stop card
      const tags = [];
      if (stop.reformer) tags.push(`<span class="tag reformer">${stop.reformer}</span>`);
      if (stop.currency) tags.push(`<span class="tag currency">${stop.currency}</span>`);
      const sitesList = getField(stop, 'sites');
      if (sitesList.length > 0) tags.push(`<span class="tag site">${sitesList.length} ${currentLang === 'ko' ? '유적지' : 'sites'}</span>`);

      const w = weather[stop.id];
      const weatherHtml = w ? `<div class="weather-badge">${w.icon} ${w.temp} ${currentLang === 'ko' ? w.ko : w.desc}</div>` : '';

      card.innerHTML = `
        <div class="type-bar" style="background:${markerColors[stop.type]}"></div>
        <div class="day-header">
          <span class="day-badge ${stop.type}">${stop.days}</span>
          <span class="day-city">${stop.city}</span>
          <span class="day-date">${stop.dates}</span>
        </div>
        <div class="day-summary">${getField(stop, 'summary')}</div>
        ${weatherHtml}
        <div class="day-tags">${tags.join('')}</div>
      `;
    }

    card.addEventListener('click', () => {
      showDetail(stop.id);
      if (stop.lat !== null && markers[stop.id]) {
        map.flyTo([stop.lat, stop.lng], 10, { duration: 1.2 });
        markers[stop.id].openPopup();
      }
    });

    sb.appendChild(card);
  });
}

function showDetail(id) {
  const stop = stops.find(s => s.id === id);
  if (!stop) return;
  currentDetailId = id;

  // Update active card
  document.querySelectorAll('.day-card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById(`card-${id}`);
  if (card) {
    card.classList.add('active');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  const panel = document.getElementById('detail-panel');
  const ui = uiText[currentLang];
  const tipsList = getField(stop, 'tips');
  const isKo = currentLang === 'ko';

  const tipsHtml = tipsList.length > 0
    ? `<div class="detail-section"><h3>${ui.tips}</h3><div class="tip-box"><p>${tipsList.join('<br>')}</p></div></div>`
    : '';

  if (stop.type === 'flight') {
    // Flight detail rendering
    const flightsHtml = stop.flights.map(f => `
      <div class="flight-detail-segment">
        <div class="flight-detail-header">
          <span class="flight-detail-airline">${f.airline}</span>
          <span class="flight-detail-number">${f.number}</span>
        </div>
        <div class="flight-detail-route">
          <div class="flight-detail-airport">
            <div class="airport-code">${f.from}</div>
            <div class="airport-name">${f.fromName}</div>
            <div class="airport-time">${f.depart}</div>
            ${f.terminal_from ? `<div class="airport-name">${f.terminal_from}</div>` : ''}
          </div>
          <div class="flight-detail-arrow">&#9992; &#8594;</div>
          <div class="flight-detail-airport" style="text-align:right">
            <div class="airport-code">${f.to}</div>
            <div class="airport-name">${f.toName}</div>
            <div class="airport-time">${f.arrive}</div>
            ${f.terminal_to ? `<div class="airport-name">${f.terminal_to}</div>` : ''}
          </div>
        </div>
        <div class="flight-detail-meta">
          <span>${isKo ? '소요시간' : 'Duration'}: ${f.duration}</span>
          <span>${isKo ? '좌석' : 'Cabin'}: ${f.cabin}</span>
        </div>
      </div>
    `).join('');

    const bag = stop.baggage;
    const baggageHtml = bag ? `
      <div class="detail-section">
        <h3>${isKo ? '수하물 정보' : 'Baggage Info'}</h3>
        <div class="baggage-info">
          <strong>${isKo ? '기내 수하물' : 'Carry-on'}:</strong> ${bag.carryon}<br>
          <strong>${isKo ? '위탁 수하물 1' : 'Checked Bag 1'}:</strong> ${bag.checked1}<br>
          <strong>${isKo ? '위탁 수하물 2' : 'Checked Bag 2'}:</strong> ${bag.checked2}
        </div>
      </div>
    ` : '';

    panel.innerHTML = `
      <div class="detail-header">
        <button class="detail-close" onclick="document.getElementById('detail-panel').style.display='none'; currentDetailId=null;">&times;</button>
        <h2>${isKo ? (stop.id === 'flight-out' ? '출발 항공편' : '귀국 항공편') : stop.city}</h2>
        <div class="detail-date">${stop.days} &middot; ${stop.dates} &middot; ${stop.country}</div>
      </div>
      <div class="detail-body">
        <div class="detail-section">
          <h3>${isKo ? '항공편 상세' : 'Flight Details'}</h3>
          ${flightsHtml}
        </div>
        ${baggageHtml}
        ${tipsHtml}
      </div>
    `;
  } else {
    // Normal stop detail
    const sitesList = getField(stop, 'sites');
    const sitesHtml = sitesList.length > 0
      ? `<div class="detail-section"><h3>${ui.sites}</h3><ul>${sitesList.map(s => `<li>${s}</li>`).join('')}</ul></div>`
      : '';

    const foodList = getField(stop, 'food') || [];
    const foodHtml = foodList.length > 0

      : '';

    const shopList = getField(stop, 'shopping') || [];
    const shopHtml = shopList.length > 0
      ? `<div class="detail-section"><h3 class="shop-header">${isKo ? '쇼핑 추천' : 'What to Buy'}</h3><ul>${shopList.map(s => `<li class="shop-item">${s}</li>`).join('')}</ul></div>`

    const imageHtml = stop.image

      : '';

    const w = weather[stop.id];
    const weatherHtml = w
      ? `<div class="detail-weather"><span class="weather-icon">${w.icon}</span> <strong>${w.temp}</strong> &mdash; ${isKo ? w.ko : w.desc}</div>`

    panel.innerHTML = `
      <div class="detail-header">
        <button class="detail-close" onclick="document.getElementById('detail-panel').style.display='none'; currentDetailId=null;">&times;</button>
        <h2>${stop.city}, ${stop.country}</h2>
        <div class="detail-date">${stop.days} &middot; ${stop.dates}</div>
      </div>
      <div class="detail-body">
        ${imageHtml}
        ${weatherHtml}
        <div class="detail-section">
          <h3>${ui.history}</h3>
          <p>${getField(stop, 'history')}</p>
        </div>
        ${sitesHtml}
        ${foodHtml}
        ${shopHtml}
        ${tipsHtml}
      </div>
    `;
  }

  panel.style.display = 'block';
}

// Mobile tab switching
function switchTab(tab) {
  const sidebarEl = document.getElementById('sidebar');
  const mapEl = document.getElementById('map');
  const tabList = document.getElementById('tab-list');
  const tabMap = document.getElementById('tab-map');

  if (tab === 'list') {
    sidebarEl.classList.remove('hidden');
    mapEl.classList.remove('visible');
    tabList.classList.add('active');
    tabMap.classList.remove('active');
  } else {
    sidebarEl.classList.add('hidden');
    mapEl.classList.add('visible');
    tabList.classList.remove('active');
    tabMap.classList.add('active');
    // Leaflet needs invalidateSize after becoming visible
    setTimeout(() => map.invalidateSize(), 100);
  }
}

// Update tab labels on language switch
const origSetLang = setLang;
setLang = function(lang) {
  origSetLang(lang);
  const tabList = document.getElementById('tab-list');
  const tabMap = document.getElementById('tab-map');
  if (tabList) tabList.textContent = lang === 'ko' ? '일정' : 'Itinerary';
  if (tabMap) tabMap.textContent = lang === 'ko' ? '지도' : 'Map';
};

// When clicking a sidebar card on mobile, switch to map
const origShowDetail = showDetail;
showDetail = function(id) {
  origShowDetail(id);
  if (window.innerWidth <= 768) {
    // Don't auto-switch to map on mobile — keep the detail panel fullscreen overlay
  }
};

// Timezone clocks
// During the trip (Mar 16-27, 2026): US is PDT (UTC-7), Europe is CET (UTC+1) = +8h difference
// Europe doesn't switch to CEST until Mar 29
function updateClocks() {
  const now = new Date();
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;

  // PDT = UTC-7, CET = UTC+1
  const pdt = new Date(utc - 7 * 3600000);
  const cet = new Date(utc + 1 * 3600000);

  const fmt = (d) => d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });

  document.getElementById('tz-home-time').textContent = fmt(pdt);
  document.getElementById('tz-euro-time').textContent = fmt(cet);
}

updateClocks();
setInterval(updateClocks, 30000);

// Update timezone labels on language switch
const origSetLang2 = setLang;
setLang = function(lang) {
  origSetLang2(lang);
  document.getElementById('tz-home-label').textContent = lang === 'ko' ? '미국 PDT' : 'PDT';
  document.getElementById('tz-euro-label').textContent = lang === 'ko' ? '유럽 CET' : 'CET';
  const diffEl = document.getElementById('tz-diff');
  diffEl.textContent = lang === 'ko' ? '+8시간' : '+8h';
};

// Initial sidebar build
rebuildSidebar();

// Fit map to all markers
map.fitBounds(routeCoords, { padding: [40, 40] });
